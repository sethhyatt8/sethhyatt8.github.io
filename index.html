<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/icons/hub.svg" type="image/svg+xml" />
  <title>Main Hub</title>
  <style>
    :root {
      --bg-app: #0b1220;
      --bg-surface: #17233a;
      --bg-surface-elevated: #1d2c48;
      --text-primary: #f3f7ff;
      --text-secondary: #b9c7e3;
      --border-subtle: #2a3a5c;
      --border-strong: #3b5280;
      --accent: #f43f5e;
      --accent-strong: #fb7185;
      --shadow-sm: 0 2px 10px #00000040;
      --shadow-md: 0 8px 24px #00000059;
      --radius-lg: 16px;
      --radius-md: 12px;
      --motion-fast: 0.12s ease;
      --motion-base: 0.18s ease;
    }

    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 2rem;
      background: radial-gradient(circle at top center, #162746 0%, var(--bg-app) 48%);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .hub-link-box {
      display: block;
      max-width: 520px;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, var(--bg-surface-elevated), var(--bg-surface));
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-sm);
      transition: transform var(--motion-fast), box-shadow var(--motion-base), border-color var(--motion-base);
    }

    .hub-link-box:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
      box-shadow: var(--shadow-md);
    }

    .hub-link-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .hub-link-icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: #0d1627;
      object-fit: contain;
    }

    .hub-link-text {
      min-width: 0;
    }

    .hub-link-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .hub-link-description {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin: 0;
    }

    h1 {
      margin: 0;
      letter-spacing: 0.2px;
    }

    .hub-link-box:focus-visible {
      outline: 2px solid var(--accent-strong);
      outline-offset: 2px;
    }

    .hub-link-box:active {
      border-color: var(--accent);
      transform: translateY(1px) scale(0.995);
    }
  </style>
</head>
<body>
  <h1>Main Hub</h1>

  <a class="hub-link-box" href="/Workout/">
    <div class="hub-link-row">
      <img class="hub-link-icon" src="/icons/workout.svg" width="44" height="44" alt="" />
      <div class="hub-link-text">
        <div class="hub-link-title">Workout</div>
        <p class="hub-link-description">High Intensity Interval Training Timer</p>
      </div>
    </div>
  </a>

  <a class="hub-link-box" href="/darts-scorer">
    <div class="hub-link-row">
      <img class="hub-link-icon" src="/darts-scorer/favicon.svg" width="44" height="44" alt="" />
      <div class="hub-link-text">
        <div class="hub-link-title">Darts Scorer</div>
        <p class="hub-link-description">Scoring interface for Cricket and x01, tracks player stats.</p>
      </div>
    </div>
  </a>

  <a class="hub-link-box" href="/MahJongGame">
    <div class="hub-link-row">
      <img class="hub-link-icon" src="/icons/mahjong.svg" width="44" height="44" alt="" />
      <div class="hub-link-text">
        <div class="hub-link-title">American MahJong</div>
        <p class="hub-link-description">Analyze hands, and play mock games with Charleston</p>
      </div>
    </div>
  </a>
</body>
</html>
