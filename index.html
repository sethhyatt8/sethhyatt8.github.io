<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Main Hub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background: #f7f7f8;
      color: #1f2937;
    }

    .hub-link-box {
      display: block;
      max-width: 420px;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      text-decoration: none;
      color: inherit;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .hub-link-box:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }

    .hub-link-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .hub-link-description {
      font-size: 0.95rem;
      color: #4b5563;
      margin: 0;
    }
  </style>
</head>
<body>
  <h1>Main Hub</h1>

  <a class="hub-link-box" href="/Workout/">
    <div class="hub-link-title">Workout</div>
    <p class="hub-link-description">High Intensity Interval Training Timer</p>
  </a>
</body>
</html>
